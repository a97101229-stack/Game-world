<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameWorld</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#0f172a;
color:white;
}

header{
text-align:center;
padding:15px;
background:#020617;
font-family:Orbitron;
font-size:24px;
color:#38bdf8;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.section-title{
border-left:4px solid #38bdf8;
padding-left:10px;
margin:20px 0;
font-family:Orbitron;
}

.game-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
gap:15px;
}

.game-card{
background:#1e293b;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.game-card:hover{
transform:translateY(-5px);
}

.game-thumb{
width:100%;
height:120px;
object-fit:cover;
}

.game-info{
padding:8px;
text-align:center;
font-size:13px;
}

#adBanner{
text-align:center;
margin:15px;
}

#gamePlayer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:999;
flex-direction:column;
}

.player-nav{
background:#020617;
padding:10px;
display:flex;
justify-content:space-between;
}

.close-btn{
background:red;
border:none;
color:white;
padding:5px 15px;
cursor:pointer;
}

iframe{
border:none;
flex:1;
width:100%;
}

.loader{
text-align:center;
padding:40px;
}

</style>
</head>

<body>

<header>
🎮 GameWorld
</header>

<!-- Banner Ad -->
<div id="adBanner">
<script src="https://www.highperformanceformat.com/96d39d2cd94eb3638293e178fa3c21c2/invoke.js"></script>
</div>

<div class="container" id="mainContainer">

<div class="loader">
<i class="fas fa-spinner fa-spin fa-2x"></i>
</div>

</div>

<!-- Game Player -->

<div id="gamePlayer">

<div class="player-nav">
<span>Playing...</span>
<button class="close-btn" onclick="closeGame()">EXIT</button>
</div>

<iframe id="gameFrame"></iframe>

</div>


<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyCtVdHlCsC6KhNCPL6wpLejeU4hNXJNUKc",
authDomain:"game-world-5dc0b.firebaseapp.com",
projectId:"game-world-5dc0b"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const mainContainer=document.getElementById("mainContainer");

async function loadSections(){

mainContainer.innerHTML="";

const categories=await db.collection("categories").get();

categories.forEach(async(doc)=>{

const cat=doc.data().name;

const section=document.createElement("div");

section.innerHTML=`
<h2 class="section-title">${cat}</h2>
<div class="game-grid" id="grid-${doc.id}"></div>
`;

mainContainer.appendChild(section);

loadGames(cat,"grid-"+doc.id);

});

}

function loadGames(category,gridId){

db.collection("games")
.where("category","==",category)
.limit(8)
.get()
.then(snapshot=>{

const grid=document.getElementById(gridId);

let html="";

snapshot.forEach(doc=>{

const game=doc.data();

html+=`

<div class="game-card" onclick="playGame('${game.link}')">

<img src="${game.image}" class="game-thumb">

<div class="game-info">
${game.title}
</div>

</div>

`;

});

grid.innerHTML=html;

});

}

function playGame(url){

document.getElementById("gameFrame").src=url;

document.getElementById("gamePlayer").style.display="flex";

}

function closeGame(){

document.getElementById("gameFrame").src="";

document.getElementById("gamePlayer").style.display="none";

}

loadSections();

</script>

<!-- Popunder Ad -->

<script src="https://pl28855054.effectivegatecpm.com/cf/c9/61/cfc961607263f7f614e4c0676e6ca37b.js"></script>

</body>
</html>
